// ─── AIRTABLE API ────────────────────────────────────────────────────
function airtable(token) {
  const base = `https://api.airtable.com/v0/${BASE_ID}`;
  const h = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };

  async function getAll(table) {
    let records = [], offset = null;
    do {
      const url = `${base}/${encodeURIComponent(table)}?pageSize=100${offset ? '&offset=' + offset : ''}`;
      const r = await fetch(url, { headers: h });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      records = records.concat(d.records);
      offset = d.offset;
    } while (offset);
    return records;
  }

  async function create(table, fields) {
    const r = await fetch(`${base}/${encodeURIComponent(table)}`, {
      method: 'POST', headers: h, body: JSON.stringify({ records: [{ fields }] })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d.records[0];
  }

  async function update(table, id, fields) {
    const r = await fetch(`${base}/${encodeURIComponent(table)}/${id}`, {
      method: 'PATCH', headers: h, body: JSON.stringify({ fields })
    });
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    return d;
  }

  async function createMany(table, fieldsArray) {
    const chunks = [];
    for (let i = 0; i < fieldsArray.length; i += 10) chunks.push(fieldsArray.slice(i, i + 10));
    const results = [];
    for (const chunk of chunks) {
      const r = await fetch(`${base}/${encodeURIComponent(table)}`, {
        method: 'POST', headers: h,
        body: JSON.stringify({ records: chunk.map(f => ({ fields: f })) })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error.message);
      results.push(...d.records);
    }
    return results;
  }

  return { getAll, create, update, createMany };
}

// ─── NEW ORDER ───────────────────────────────────────────────────────
function NewOrderScreen({ user, api }) {
  const [suppliers, setSuppliers] = useState([]);
  const [products, setProducts] = useState([]);
  const [supplierId, setSupplierId] = useState('');
  const [quantities, setQuantities] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [sent, setSent] = useState(null);
  const [orderText, setOrderText] = useState('');

  useEffect(() => {
    async function load() {
      try {
        const [sups, prods] = await Promise.all([api.getAll('Suppliers'), api.getAll('Products')]);
        setSuppliers(sups);
        setProducts(prods.filter(p => p.fields['Active'] !== false));
        if (sups.length) setSupplierId(sups[0].id);
      } catch(e) { alert('Error loading data: ' + e.message); }
      finally { setLoading(false); }
    }
    load();
  }, []);

  const supplier = suppliers.find(s => s.id === supplierId);
  const filteredProducts = products.filter(p => {
    const links = p.fields['Supplier'];
    return links && links.includes(supplierId);
  });

  const bump = (pid, delta) => {
    const cur = Number(quantities[pid] || 0);
    const next = Math.max(0, cur + delta);
    setQuantities(q => ({ ...q, [pid]: next === 0 ? '' : String(next) }));
  };

  const orderLines = filteredProducts
    .filter(p => quantities[p.id] && Number(quantities[p.id]) > 0)
    .map(p => `${quantities[p.id]} x ${p.fields['Name']} (${p.fields['Unit'] || ''})`);

  const today = new Date().toISOString().slice(0,10);
  const message = supplier ? `Order for ${supplier.fields['Name']}\nRestaurant: ${user.restaurant}\nDate: ${today}\nRequested by: ${user.name}\n\n${orderLines.join('\n')}` : '';

  async function saveOrder() {
    if (!orderLines.length) return;
    setSaving(true);
    try {
      const order = await api.create('Orders', {
        'Order Date': today,
        'Supplier': [supplierId],
        'Restaurant': user.restaurant,
        'Status': 'Pending',
        'Created By': user.name,
      });
      const items = filteredProducts
        .filter(p => quantities[p.id] && Number(quantities[p.id]) > 0)
        .map(p => ({
          'Order': [order.id],
          'Product': [p.id],
          'Quantity': Number(quantities[p.id]),
          'Received': false,
          'Invoice Match': 'Pending Review',
        }));
      await api.createMany('Order Items', items);
      setOrderText(message);
      setQuantities({});
    } catch(e) { alert('Error saving order: ' + e.message); }
    finally { setSaving(false); }
  }

  if (loading) return <Loader />;

  return (
    <div>
      <div style={{ marginBottom: '1.25rem' }}>
        <label style={{ fontSize: 13, color: 'var(--text-secondary)', display: 'block', marginBottom: 6 }}>Supplier</label>
        <select value={supplierId} onChange={e => { setSupplierId(e.target.value); setQuantities({}); setSent(null); setOrderText(''); }} style={{ width: '100%' }}>
          {suppliers.map(s => <option key={s.id} value={s.id}>{s.fields['Name']}</option>)}
        </select>
      </div>

      {filteredProducts.length === 0 ? (
        <div style={{ color: 'var(--text-muted)', fontSize: 14, padding: '1rem', background: 'var(--surface-1)', borderRadius: 'var(--radius)', textAlign: 'center' }}>
          No products found for this supplier.<br/>Add products in Airtable and link them to this supplier.
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {filteredProducts.map(p => (
            <div key={p.id} style={{ padding: '12px 14px', background: 'var(--surface-1)', borderRadius: 'var(--radius)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
                <div style={{ minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{p.fields['Name']}</div>
                  <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{p.fields['']} · {p.fields['Unit']}</div>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexShrink: 0 }}>
                  <button onClick={() => bump(p.id, -1)} style={{ width: 36, height: 36, padding: 0, minHeight: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <i className="ti ti-minus" style={{ fontSize: 14 }}></i>
                  </button>
                  <input type="number" min="0" inputMode="numeric" placeholder="0" value={quantities[p.id] || ''}
                    onChange={e => setQuantities(q => ({ ...q, [p.id]: e.target.value }))}
                    style={{ width: 50, textAlign: 'center', padding: '8px 4px', minHeight: 36 }} />
                  <button onClick={() => bump(p.id, 1)} style={{ width: 36, height: 36, padding: 0, minHeight: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <i className="ti ti-plus" style={{ fontSize: 14 }}></i>
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {orderLines.length > 0 && !orderText && (
        <button onClick={saveOrder} disabled={saving}
          style={{ marginTop: '1.25rem', width: '100%', background: 'var(--fill-primary)', color: 'var(--on-primary)', border: 'none', padding: '14px' }}>
          {saving ? <span className="spinner"></span> : 'Save & prepare to send'}
        </button>
      )}

      {orderText && (
        <div style={{ marginTop: '1.5rem', background: 'var(--surface-1)', borderRadius: 'var(--radius)', padding: '1rem' }}>
          <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 8 }}>✓ Order saved. Send it:</div>
          <pre style={{ fontSize: 13, fontFamily: 'inherit', whiteSpace: 'pre-wrap', margin: '0 0 14px', wordBreak: 'break-word', background: 'var(--surface-2)', padding: 10, borderRadius: 8 }}>{orderText}</pre>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <a href={`https://wa.me/?text=${encodeURIComponent(orderText)}`} target="_blank"
              style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: '#25D366', color: '#fff', border: 'none', padding: '12px', borderRadius: 'var(--radius)', fontWeight: 500, textDecoration: 'none', fontSize: 16, minHeight: 44 }}>
              <i className="ti ti-brand-whatsapp" style={{ fontSize: 18 }}></i>Send via WhatsApp
            </a>
            <a href={`mailto:?subject=Order for ${supplier?.fields['Name']}&body=${encodeURIComponent(orderText)}`}
              style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: 'var(--surface-2)', color: 'var(--text-primary)', border: '0.5px solid var(--border-strong)', padding: '12px', borderRadius: 'var(--radius)', fontWeight: 500, textDecoration: 'none', fontSize: 16, minHeight: 44 }}>
              <i className="ti ti-mail" style={{ fontSize: 17 }}></i>Send via email
            </a>
            <button onClick={() => { navigator.clipboard?.writeText(orderText); setSent('copy'); }}
              style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
              <i className="ti ti-copy" style={{ fontSize: 16 }}></i>{sent === 'copy' ? 'Copied!' : 'Copy text'}
            </button>
          </div>
          <button onClick={() => setOrderText('')}
            style={{ marginTop: 12, width: '100%', fontSize: 13, background: 'transparent', border: 'none', color: 'var(--text-muted)' }}>
            + New order for another supplier
          </button>
        </div>
      )}
    </div>
  );
}

// ─── OPEN ORDERS ─────────────────────────────────────────────────────

  const [orders, setOrders] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    async function load() {
      try {
        const [o, s, i] = await Promise.all([api.getAll('Orders'), api.getAll('Suppliers'), api.getAll('Order Items')]);
        setOrders(o.filter(x => x.fields['Status'] !== 'Closed').sort((a,b) => b.fields['Order Date']?.localeCompare(a.fields['Order Date'] || '') || 0));
        setSuppliers(s);
        setItems(i);
      } catch(e) { alert('Error: ' + e.message); }
      finally { setLoading(false); }
    }
    load();
  }, []);

  const restColors = { 'Sóller': 'amber', 'Deià': 'teal', 'Fornalutx Bistro': 'blue', 'Urban Kitchen': 'gray' };

  if (loading) return <Loader />;
  if (!orders.length) return <div style={{ color: 'var(--text-muted)', textAlign: 'center', padding: '2rem' }}>No open orders.</div>;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
      {orders.map(o => {
        const sup = suppliers.find(s => s.id === (o.fields['Supplier'] || [])[0]);
        const oItems = items.filter(i => (i.fields['Order'] || []).includes(o.id));
        const statusColor = o.fields['Status'] === 'Pending' ? 'amber' : 'teal';
        return (
          <div key={o.id} style={{ background: 'var(--surface-2)', border: '0.5px solid var(--border)', borderRadius: 12, padding: '1rem 1.1rem' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 8, gap: 8 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontWeight: 500, fontSize: 14 }}>{sup?.fields['Name'] || 'Unknown supplier'}</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{o.fields['Order Date']} · {o.fields['Created By']}</div>
                <div style={{ marginTop: 4 }}>
                  <Badge color={restColors[o.fields['Restaurant']] || 'gray'}>{o.fields['Restaurant']}</Badge>
                  {' '}<Badge color={statusColor}>{o.fields['Status']}</Badge>
                </div>
              </div>
            </div>
            <div style={{ fontSize: 13, color: 'var(--text-secondary)', borderTop: '0.5px solid var(--border)', paddingTop: 8 }}>
              {oItems.length === 0 ? <span style={{ color: 'var(--text-muted)' }}>No items</span> :
                oItems.map((it, i) => <div key={i} style={{ padding: '2px 0' }}>{it.fields['Quantity']} × (loading product...)</div>)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── RECEIVE GOODS ───────────────────────────────────────────────────
function DeliveryScreen({ api }) {
  const [orders, setOrders] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [allItems, setAllItems] = useState([]);
  const [products, setProducts] = useState([]);
  const [selected, setSelected] = useState(null);
  const [checks, setChecks] = useState({});
  const [notes, setNotes] = useState({});
  const [openNote, setOpenNote] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    async function load() {
      try {
        const [o, s, i, p] = await Promise.all([api.getAll('Orders'), api.getAll('Suppliers'), api.getAll('Order Items'), api.getAll('Products')]);
        const pending = o.filter(x => x.fields['Status'] === 'Pending');
        setOrders(pending);
        setSuppliers(s);
        setAllItems(i);
        setProducts(p);
        if (pending.length) setSelected(pending[0].id);
      } catch(e) { alert('Error: ' + e.message); }
      finally { setLoading(false); }
    }
    load();
  }, []);

  const order = orders.find(o => o.id === selected);
  const sup = order ? suppliers.find(s => s.id === (order.fields['Supplier'] || [])[0]) : null;
  const items = order ? allItems.filter(i => (i.fields['Order'] || []).includes(order.id)) : [];

 const allChecked = items.length > 0;

  async function markDelivered() {
    setSaving(true);
    try {
      for (const item of items) {
        await api.update('Order Items', item.id, {
          'Received': !!checks[item.id],
          'Delivery Note': notes[item.id] || '',
        });
      }
      await api.update('Orders', order.id, { 'Status': 'Delivered', 'Delivery Date': new Date().toISOString().slice(0,10) });
      setOrders(o => o.filter(x => x.id !== order.id));
      setSelected(orders.find(o => o.id !== order.id)?.id || null);
      setChecks({}); setNotes({});
    } catch(e) { alert('Error: ' + e.message); }
    finally { setSaving(false); }
  }

  if (loading) return <Loader />;
  if (!orders.length) return <div style={{ color: 'var(--text-muted)', textAlign: 'center', padding: '2rem' }}>No pending deliveries.</div>;

  return (
    <div>
      <div style={{ marginBottom: '1rem' }}>
        <label style={{ fontSize: 13, color: 'var(--text-secondary)', display: 'block', marginBottom: 6 }}>Select order to receive</label>
        <select value={selected || ''} onChange={e => { setSelected(e.target.value); setChecks({}); setNotes({}); }} style={{ width: '100%' }}>
          {orders.map(o => {
            const s = suppliers.find(x => x.id === (o.fields['Supplier'] || [])[0]);
            return <option key={o.id} value={o.id}>{s?.fields['Name']} – {o.fields['Restaurant']} ({o.fields['Order Date']})</option>;
          })}
        </select>
      </div>

      {order && (
        <>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>
            {sup?.fields['Name']} · {order.fields['Restaurant']} · ordered by {order.fields['Created By']}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {items.map(item => {
              const prod = products.find(p => (item.fields['Product'] || []).includes(p.id));
              return (
                <div key={item.id} style={{ background: 'var(--surface-1)', borderRadius: 'var(--radius)', padding: '12px 14px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }} onClick={() => setChecks(c => ({ ...c, [item.id]: !c[item.id] }))}>
                    <input type="checkbox" checked={!!checks[item.id]} readOnly style={{ width: 22, height: 22, minHeight: 22, padding: 0 }} />
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 500 }}>{item.fields['Quantity']} × {prod?.fields['Name'] || '...'}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{prod?.fields['']}</div>
                    </div>
                    {checks[item.id] && <i className="ti ti-check" style={{ color: 'var(--text-success)', fontSize: 18 }}></i>}
                  </div>
                  <button onClick={() => setOpenNote(openNote === item.id ? null : item.id)}
                    style={{ marginTop: 8, fontSize: 12, padding: '6px 10px', minHeight: 32, color: 'var(--text-secondary)', background: 'transparent', border: 'none' }}>
                    {notes[item.id] ? `📝 ${notes[item.id]}` : '+ Add note'}
                  </button>
                  {openNote === item.id && (
                    <input type="text" placeholder="What's the issue?" value={notes[item.id] || ''}
                      onChange={e => setNotes(n => ({ ...n, [item.id]: e.target.value }))}
                      style={{ width: '100%', marginTop: 6, fontSize: 14 }} autoFocus />
                  )}
                </div>
              );
            })}
          </div>
          <button onClick={markDelivered} disabled={!allChecked || saving}
            style={{ marginTop: '1.25rem', width: '100%', background: allChecked ? 'var(--fill-primary)' : 'var(--fill-disabled)', color: allChecked ? 'var(--on-primary)' : 'var(--text-disabled)', border: 'none', padding: '14px' }}>
            {saving ? <span className="spinner"></span> : 'Mark delivery complete'}
          </button>
        </>
      )}
    </div>
  );
}

// ─── CHECK INVOICE ───────────────────────────────────────────────────
function InvoiceScreen({ api }) {
  const [orders, setOrders] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [allItems, setAllItems] = useState([]);
  const [products, setProducts] = useState([]);
  const [selected, setSelected] = useState(null);
  const [matches, setMatches] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    async function load() {
      try {
        const [o, s, i, p] = await Promise.all([api.getAll('Orders'), api.getAll('Suppliers'), api.getAll('Order Items'), api.getAll('Products')]);
        const delivered = o.filter(x => x.fields['Status'] === 'Delivered');
        setOrders(delivered);
        setSuppliers(s);
        setAllItems(i);
        setProducts(p);
        if (delivered.length) setSelected(delivered[0].id);
      } catch(e) { alert('Error: ' + e.message); }
      finally { setLoading(false); }
    }
    load();
  }, []);

  const order = orders.find(o => o.id === selected);
  const sup = order ? suppliers.find(s => s.id === (order.fields['Supplier'] || [])[0]) : null;
  const items = order ? allItems.filter(i => (i.fields['Order'] || []).includes(order.id)) : [];
  const allReviewed = items.length > 0 && items.every(i => matches[i.id]);

  async function closeOrder(user) {
    setSaving(true);
    try {
      for (const item of items) {
        await api.update('Order Items', item.id, { 'Invoice Match': matches[item.id] || 'Pending Review' });
      }
      await api.update('Orders', order.id, { 'Status': 'Closed' });
      setOrders(o => o.filter(x => x.id !== order.id));
      setSelected(orders.find(o => o.id !== order.id)?.id || null);
      setMatches({});
    } catch(e) { alert('Error: ' + e.message); }
    finally { setSaving(false); }
  }

  if (loading) return <Loader />;
  if (!orders.length) return <div style={{ color: 'var(--text-muted)', textAlign: 'center', padding: '2rem' }}>No orders pending invoice check.</div>;

  return (
    <div>
      <div style={{ marginBottom: '1rem' }}>
        <label style={{ fontSize: 13, color: 'var(--text-secondary)', display: 'block', marginBottom: 6 }}>Select order</label>
        <select value={selected || ''} onChange={e => { setSelected(e.target.value); setMatches({}); }} style={{ width: '100%' }}>
          {orders.map(o => {
            const s = suppliers.find(x => x.id === (o.fields['Supplier'] || [])[0]);
            return <option key={o.id} value={o.id}>{s?.fields['Name']} – {o.fields['Restaurant']} ({o.fields['Order Date']})</option>;
          })}
        </select>
      </div>

      {order && (
        <>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 }}>
            {sup?.fields['Name']} · {order.fields['Restaurant']} · delivered {order.fields['Delivery Date']}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {items.map(item => {
              const prod = products.find(p => (item.fields['Product'] || []).includes(p.id));
              return (
                <div key={item.id} style={{ background: 'var(--surface-1)', borderRadius: 'var(--radius)', padding: '12px 14px' }}>
                  <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 4 }}>{item.fields['Quantity']} × {prod?.fields['Name'] || '...'}</div>
                  {item.fields['Delivery Note'] && <div style={{ fontSize: 12, color: 'var(--text-warning)', marginBottom: 8 }}>Note: {item.fields['Delivery Note']}</div>}
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={() => setMatches(m => ({ ...m, [item.id]: 'Matches' }))}
                      style={{ flex: 1, padding: '10px', fontSize: 13,
                        background: matches[item.id] === 'Matches' ? 'var(--bg-success)' : 'var(--surface-2)',
                        color: matches[item.id] === 'Matches' ? 'var(--text-success)' : 'var(--text-secondary)',
                        border: matches[item.id] === 'Matches' ? '0.5px solid var(--text-success)' : '0.5px solid var(--border-strong)' }}>
                      ✓ Matches
                    </button>
                    <button onClick={() => setMatches(m => ({ ...m, [item.id]: 'Discrepancy' }))}
                      style={{ flex: 1, padding: '10px', fontSize: 13,
                        background: matches[item.id] === 'Discrepancy' ? 'var(--bg-danger)' : 'var(--surface-2)',
                        color: matches[item.id] === 'Discrepancy' ? 'var(--text-danger)' : 'var(--text-secondary)',
                        border: matches[item.id] === 'Discrepancy' ? '0.5px solid var(--text-danger)' : '0.5px solid var(--border-strong)' }}>
                      ✕ Discrepancy
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={closeOrder} disabled={!allReviewed || saving}
            style={{ marginTop: '1.25rem', width: '100%', background: allReviewed ? 'var(--fill-primary)' : 'var(--fill-disabled)', color: allReviewed ? 'var(--on-primary)' : 'var(--text-disabled)', border: 'none', padding: '14px' }}>
            {saving ? <span className="spinner"></span> : 'Close order'}
          </button>
        </>
      )}
    </div>
  );
}

// ─── PRODUCTS (ADMIN) ─────────────────────────────────────────────────
function ProductsScreen({ api }) {
  const [products, setProducts] = useState([]);
  const [suppliers, setSuppliers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ nameEn: '', nameEs: '', supplierId: '', unit: 'Unit', active: true });
  const [saving, setSaving] = useState(false);

  async function load() {
    try {
      const [p, s] = await Promise.all([api.getAll('Products'), api.getAll('Suppliers')]);
      setProducts(p);
      setSuppliers(s);
      if (s.length) setForm(f => ({ ...f, supplierId: s[0].id }));
    } catch(e) { alert('Error: ' + e.message); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);

  async function addProduct() {
    if (!form.nameEn) return;
    setSaving(true);
    try {
      await api.create('Products', {
        'Name': form.nameEn,
        '': form.nameEs,
        'Supplier': [form.supplierId],
        'Unit': form.unit,
        'Active': true,
      });
      setForm(f => ({ ...f, nameEn: '', nameEs: '' }));
      setAdding(false);
      await load();
    } catch(e) { alert('Error: ' + e.message); }
    finally { setSaving(false); }
  }

  async function toggleActive(p) {
    try {
      await api.update('Products', p.id, { 'Active': !p.fields['Active'] });
      setProducts(ps => ps.map(x => x.id === p.id ? { ...x, fields: { ...x.fields, 'Active': !x.fields['Active'] } } : x));
    } catch(e) { alert('Error: ' + e.message); }
  }

  if (loading) return <Loader />;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
        <div style={{ fontSize: 13, color: 'var(--text-secondary)' }}>{products.length} products total</div>
        <button onClick={() => setAdding(!adding)} style={{ fontSize: 13, padding: '8px 14px', minHeight: 36 }}>
          {adding ? 'Cancel' : '+ Add product'}
        </button>
      </div>

      {adding && (
        <div style={{ background: 'var(--surface-1)', borderRadius: 'var(--radius)', padding: '1rem', marginBottom: '1rem', display: 'flex', flexDirection: 'column', gap: 10 }}>
          <input placeholder="Name" value={form.nameEn} onChange={e => setForm(f => ({ ...f, nameEn: e.target.value }))} style={{ width: '100%' }} />
          <input placeholder="" value={form.nameEs} onChange={e => setForm(f => ({ ...f, nameEs: e.target.value }))} style={{ width: '100%' }} />
          <select value={form.supplierId} onChange={e => setForm(f => ({ ...f, supplierId: e.target.value }))} style={{ width: '100%' }}>
            {suppliers.map(s => <option key={s.id} value={s.id}>{s.fields['Name']}</option>)}
          </select>
          <select value={form.unit} onChange={e => setForm(f => ({ ...f, unit: e.target.value }))} style={{ width: '100%' }}>
            {['kg', 'gramm', 'box/caja', 'piece/pieza', 'pack/paqueta', 'liter', 'unit', 'barril'].map(u => <option key={u} value={u}>{u}</option>)}
          </select>
          <button onClick={addProduct} disabled={!form.nameEn || saving}
            style={{ background: 'var(--fill-primary)', color: 'var(--on-primary)', border: 'none', padding: '12px' }}>
            {saving ? <span className="spinner"></span> : 'Save product'}
          </button>
        </div>
      )}

      {suppliers.map(s => {
        const ps = products.filter(p => (p.fields['Supplier'] || []).includes(s.id));
        if (!ps.length) return null;
        return (
          <div key={s.id} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-muted)', textTransform: 'uppercase', marginBottom: 6, letterSpacing: 0.3 }}>{s.fields['Name']}</div>
            {ps.map(p => (
              <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, padding: '10px', fontSize: 13, borderBottom: '0.5px solid var(--border)', opacity: p.fields['Active'] === false ? 0.4 : 1 }}>
                <span style={{ minWidth: 0 }}>{p.fields['Name']} <span style={{ color: 'var(--text-muted)' }}>/ {p.fields['']}</span></span>
                <div style={{ display: 'flex', gap: 6, flexShrink: 0, alignItems: 'center' }}>
                  <span style={{ color: 'var(--text-muted)', fontSize: 12 }}>{p.fields['Unit']}</span>
                  <button onClick={() => toggleActive(p)} style={{ fontSize: 11, padding: '4px 8px', minHeight: 28, color: p.fields['Active'] === false ? 'var(--text-success)' : 'var(--text-danger)' }}>
                    {p.fields['Active'] === false ? 'Activate' : 'Deactivate'}
                  </button>
                </div>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(() => localStorage.getItem('groenk_token') || '');
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('new');

  const api = token ? airtable(token) : null;

  if (!token) return <SetupScreen onSave={setToken} />;
  if (!user) return <LoginScreen onLogin={(name, role, restaurant) => { setUser({ name, role, restaurant }); setTab(role === 'manager' ? 'invoice' : 'new'); }} />;

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.25rem' }}>
        <div style={{ minWidth: 0 }}>
          <h2 style={{ margin: 0 }}>Grøenk Procurement</h2>
          <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{user.name} · {user.role}{user.restaurant ? ` · ${user.restaurant}` : ''}</div>
        </div>
        <button onClick={() => setUser(null)} style={{ fontSize: 12, padding: '8px 12px', minHeight: 36 }}>Sign out</button>
      </div>
      <NavTabs active={tab} setActive={setTab} role={user.role} />
      {tab === 'new' && <NewOrderScreen user={user} api={api} />}
      {tab === 'pending' && <PendingOrdersScreen api={api} />}
      {tab === 'delivery' && <DeliveryScreen api={api} />}
      {tab === 'invoice' && <InvoiceScreen api={api} />}
      {tab === 'products' && <ProductsScreen api={api} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app-root')).render(<App />);
</script>
</body>
